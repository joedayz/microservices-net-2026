apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: microservices
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ReverseProxy__Clusters__productservice__Destinations__destination1__Address: "http://product-service:5001"
  ReverseProxy__Clusters__orderservice__Destinations__destination1__Address: "http://order-service:5003"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: microservices
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: ${ACR_NAME}.azurecr.io/gateway:latest
          ports:
            - containerPort: 5010
              name: http
          envFrom:
            - configMapRef:
                name: gateway-config
          readinessProbe:
            httpGet:
              path: /health/live
              port: 5010
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5010
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: microservices
spec:
  selector:
    app: gateway
  ports:
    - port: 80
      targetPort: 5010
      name: http
  type: LoadBalancer
