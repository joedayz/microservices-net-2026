version: '3.8'

# docker-compose.apps.yml
# Incluye infraestructura + microservicios containerizados.
# Uso: docker compose -f docker-compose.yml -f docker-compose.apps.yml up --build

services:
  # ─── Microservicios ────────────────────────────────────

  product-service:
    build:
      context: ./src/Services
      dockerfile: ProductService/Dockerfile
    container_name: product-service
    ports:
      - "5001:5001"
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=microservices_db;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMq=amqp://guest:guest@rabbitmq:5672
      - Messaging__Provider=rabbitmq
      - Auth__Provider=local
      - AppConfig__Enabled=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices

  order-service:
    build:
      context: ./src/Services
      dockerfile: OrderService/Dockerfile
    container_name: order-service
    ports:
      - "5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ProductService__CommunicationMode=http
      - ProductService__HttpUrl=http://product-service:5001
      - ProductService__GrpcUrl=http://product-service:5002
      - Auth__Provider=local
    depends_on:
      product-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5003/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - microservices

  gateway:
    build:
      context: ./src/Gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "5010:5010"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ReverseProxy__Clusters__productservice__Destinations__destination1__Address=http://product-service:5001
      - ReverseProxy__Clusters__orderservice__Destinations__destination1__Address=http://order-service:5003
    depends_on:
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5010/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - microservices

  # ─── Infraestructura (override del docker-compose.yml base) ─

  postgres:
    networks:
      - microservices

  redis:
    networks:
      - microservices

  rabbitmq:
    networks:
      - microservices

networks:
  microservices:
    driver: bridge
